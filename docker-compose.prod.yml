version: '3.9'

# ─── Noblesse PMS — Production Docker Compose ────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env.prod or export before running):
#   POSTGRES_PASSWORD, REDIS_PASSWORD, JWT_SECRET, JWT_REFRESH_SECRET,
#   NEXT_PUBLIC_API_URL, NEXT_PUBLIC_WS_URL

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: Noblesse_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: Noblesse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: Noblesse_pms
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U Noblesse -d Noblesse_pms']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - Noblesse_internal
    # No external port exposure in production — accessed via internal network only

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: Noblesse_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - Noblesse_internal

  # ── API (NestJS) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: Noblesse_api_prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://Noblesse:${POSTGRES_PASSWORD}@postgres:5432/Noblesse_pms?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.Noblessepms.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - Noblesse_internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  # ── Web (Next.js) ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.Noblessepms.com}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.Noblessepms.com}
    container_name: Noblesse_web_prod
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.Noblessepms.com}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.Noblessepms.com}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - Noblesse_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M

  # ── Nginx (reverse proxy + SSL termination) ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: Noblesse_nginx_prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - api
      - web
    healthcheck:
      test: ['CMD-SHELL', 'nginx -t && wget -qO- http://localhost/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - Noblesse_internal
      - Noblesse_external

  # ── DB Migration runner (one-shot) ───────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: Noblesse_migrate
    command: sh -c "cd /app/apps/api && npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://Noblesse:${POSTGRES_PASSWORD}@postgres:5432/Noblesse_pms?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - Noblesse_internal
    restart: 'no'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local

networks:
  Noblesse_internal:
    driver: bridge
    internal: true
  Noblesse_external:
    driver: bridge