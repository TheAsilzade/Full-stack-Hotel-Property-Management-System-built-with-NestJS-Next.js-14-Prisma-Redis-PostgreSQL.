version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: Noblesse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: Noblesse
      POSTGRES_PASSWORD: Noblesse_pass
      POSTGRES_DB: Noblesse_pms
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U Noblesse -d Noblesse_pms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: Noblesse_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: Noblesse_mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI

volumes:
  postgres_data:
  redis_data: